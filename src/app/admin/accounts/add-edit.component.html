<div class="card">
  <div class="card-header">
    <h4 style="margin: 0; font-size: 1rem;">{{isAddMode ? 'Add' : 'Edit'}} Account</h4>
  </div>
  <div class="card-body">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Title</label>
        <select formControlName="title" class="form-select"
          [class.is-invalid]="submitted && f['title'].errors">
          <option value=""></option>
          <option *ngFor="let t of ['Mr','Mrs','Ms','Dr']" [value]="t">{{t}}</option>
        </select>
        <div *ngIf="submitted && f['title'].errors" class="invalid-feedback">
          <div *ngIf="f['title'].errors['required']">Title is required</div>
        </div>
      </div>
      <div class="row">
        <div class="col mb-3">
          <label class="form-label">First Name</label>
          <input type="text" formControlName="firstName" class="form-control" placeholder="First name"
            [class.is-invalid]="submitted && f['firstName'].errors" />
          <div *ngIf="submitted && f['firstName'].errors" class="invalid-feedback">
            <div *ngIf="f['firstName'].errors['required']">First Name is required</div>
          </div>
        </div>
        <div class="col mb-3">
          <label class="form-label">Last Name</label>
          <input type="text" formControlName="lastName" class="form-control" placeholder="Last name"
            [class.is-invalid]="submitted && f['lastName'].errors" />
          <div *ngIf="submitted && f['lastName'].errors" class="invalid-feedback">
            <div *ngIf="f['lastName'].errors['required']">Last Name is required</div>
          </div>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="text" formControlName="email" class="form-control" placeholder="you@example.com"
          [class.is-invalid]="submitted && f['email'].errors" />
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
          <div *ngIf="f['email'].errors['required']">Email is required</div>
          <div *ngIf="f['email'].errors['email']">Email is invalid</div>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Role</label>
        <select formControlName="role" class="form-select"
          [class.is-invalid]="submitted && f['role'].errors">
          <option value=""></option>
          <option *ngFor="let r of ['User','Admin']" [value]="r">{{r}}</option>
        </select>
        <div *ngIf="submitted && f['role'].errors" class="invalid-feedback">
          <div *ngIf="f['role'].errors['required']">Role is required</div>
        </div>
      </div>
      <div class="row">
        <div class="col mb-3">
          <label class="form-label">Password <span style="color: var(--text-muted); font-weight: 400;" *ngIf="!isAddMode">(leave blank to keep current)</span></label>
          <input type="password" formControlName="password" class="form-control" placeholder="Password"
            [class.is-invalid]="submitted && f['password'].errors" />
          <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
            <div *ngIf="f['password'].errors['required']">Password is required</div>
            <div *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</div>
          </div>
        </div>
        <div class="col mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" formControlName="confirmPassword" class="form-control" placeholder="Repeat password"
            [class.is-invalid]="submitted && f['confirmPassword'].errors" />
          <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
            <div *ngIf="f['confirmPassword'].errors['required']">Confirm Password is required</div>
            <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
          </div>
        </div>
      </div>
      <div class="d-flex align-items-center" style="gap: 0.5rem; flex-wrap: wrap;">
        <button type="submit" class="btn btn-primary" [disabled]="loading" style="min-width: 100px;">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
          Save
        </button>
        <a routerLink=".." class="btn btn-link">Cancel</a>
      </div>
    </form>
  </div>
</div>
