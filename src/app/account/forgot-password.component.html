<div class="card">
  <div class="card-header">
    <h3 style="margin: 0; font-size: 1.15rem;">Forgot Password</h3>
  </div>
  <div class="card-body">
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.25rem;">Enter your email and we'll send you a link to reset your password.</p>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="text" formControlName="email" class="form-control" placeholder="you@example.com"
          [class.is-invalid]="submitted && f['email'].errors" />
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
          <div *ngIf="f['email'].errors['required']">Email is required</div>
          <div *ngIf="f['email'].errors['email']">Email is invalid</div>
        </div>
      </div>
      <div class="d-flex align-items-center justify-content-between" style="gap: 0.5rem; flex-wrap: wrap;">
        <button type="submit" class="btn btn-primary" [disabled]="loading" style="min-width: 130px;">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
          Send Reset Link
        </button>
        <a routerLink="../login" class="btn btn-link">Back to Sign In</a>
      </div>
    </form>
  </div>
</div>
