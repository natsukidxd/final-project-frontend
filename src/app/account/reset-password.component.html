<div class="card">
  <div class="card-header">
    <h3 style="margin: 0; font-size: 1.15rem;">Reset Password</h3>
  </div>
  <div class="card-body">
    <div *ngIf="tokenStatus === TokenStatus.Validating" class="text-center" style="padding: 1.5rem 0;">
      <span class="spinner-border" style="width: 2rem; height: 2rem;" role="status"></span>
      <p style="margin-top: 0.75rem; color: var(--text-muted);">Validating token...</p>
    </div>
    <div *ngIf="tokenStatus === TokenStatus.Invalid" class="text-center" style="padding: 1rem 0;">
      <p style="color: var(--danger);">Token validation failed. Please request a new password reset.</p>
      <a routerLink="../forgot-password" class="btn btn-primary" style="margin-top: 0.5rem;">Request New Link</a>
    </div>
    <form *ngIf="tokenStatus === TokenStatus.Valid" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="password" formControlName="password" class="form-control" placeholder="Min. 6 characters"
          [class.is-invalid]="submitted && f['password'].errors" />
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
          <div *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</div>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" formControlName="confirmPassword" class="form-control" placeholder="Repeat password"
          [class.is-invalid]="submitted && f['confirmPassword'].errors" />
        <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
          <div *ngIf="f['confirmPassword'].errors['required']">Confirm Password is required</div>
          <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
        </div>
      </div>
      <div class="d-flex align-items-center justify-content-between" style="gap: 0.5rem; flex-wrap: wrap;">
        <button type="submit" class="btn btn-primary" [disabled]="loading" style="min-width: 130px;">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
          Reset Password
        </button>
        <a routerLink="../login" class="btn btn-link">Back to Sign In</a>
      </div>
    </form>
  </div>
</div>
