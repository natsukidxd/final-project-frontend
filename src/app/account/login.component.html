<div class="card">
  <div class="card-header">
    <h3 style="margin: 0; font-size: 1.15rem;">Sign In</h3>
  </div>
  <div class="card-body">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="text" formControlName="email" class="form-control" placeholder="you@example.com"
          [class.is-invalid]="submitted && f['email'].errors" />
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
          <div *ngIf="f['email'].errors['required']">Email is required</div>
          <div *ngIf="f['email'].errors['email']">Email is invalid</div>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" formControlName="password" class="form-control" placeholder="Enter your password"
          [class.is-invalid]="submitted && f['password'].errors" />
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
        </div>
      </div>

      <!-- Inline error message -->
      <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>

      <div class="d-flex align-items-center justify-content-between" style="gap: 0.5rem; flex-wrap: wrap;">
        <button type="submit" class="btn btn-primary" [disabled]="loading" style="min-width: 100px;">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
          Sign In
        </button>
        <div>
          <a routerLink="../register" class="btn btn-link">Create Account</a>
          <a routerLink="../forgot-password" class="btn btn-link">Forgot Password?</a>
        </div>
      </div>
    </form>
  </div>
</div>
